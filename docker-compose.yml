services:
  previewproxy:
    container_name: previewproxy
    image: ghcr.io/vigrise/previewproxy:latest
    env_file: .env
    ports:
      - "8080:8080"
    volumes:
      - cache_data:/tmp/previewproxy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"

volumes:
  cache_data:
    driver: local
